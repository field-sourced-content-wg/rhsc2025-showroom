---
type: showroom

default_width: 30
persist_url_state: true

view_switcher:
  enabled: true
  default_mode: split

tabs:
  - name: Terminal
    path: /terminal
    port: 443
  - name: OCP Console
    url: 'https://console-embed-openshift-console.${DOMAIN}' 
  - name: DevSpaces
    url: 'https://devspaces.${DOMAIN}'
  - name: Bastion ${USER}
    path: /wetty
    port: 443